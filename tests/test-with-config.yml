name: Test with configuration file path
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          configuration-file-path: ${{ github.workspace }}/actions/hardened/lerebear--sizeup-action/v0.8.11/tests/fixtures/sizeup-config.yaml
        continue-on-error: true
      - name: Assert action ran with config
        env:
          SCORE: ${{ steps.action.outputs.score }}
          CATEGORY: ${{ steps.action.outputs.category }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          echo "score: $SCORE"
          echo "category: $CATEGORY"
          # The action may fail in act due to missing PR context, but it must have run
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped"
            exit 1
          fi
          echo "PASS: action ran with config file, outcome=$OUTCOME"
