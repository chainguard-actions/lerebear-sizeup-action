name: Test basic usage with token
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
        continue-on-error: true
      - name: Assert action ran and produced outputs or failed gracefully
        env:
          OUTCOME: ${{ steps.action.outcome }}
          SCORE: ${{ steps.action.outputs.score }}
          CATEGORY: ${{ steps.action.outputs.category }}
        run: |
          echo "outcome: $OUTCOME"
          echo "score: $SCORE"
          echo "category: $CATEGORY"
          if [ "$OUTCOME" != "success" ] && [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to have a defined outcome (success or failure), got: $OUTCOME"
            exit 1
          fi
          echo "PASS: action ran with token input"
