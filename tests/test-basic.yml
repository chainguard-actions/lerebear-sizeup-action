name: Test basic usage with token
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
        continue-on-error: true
      - name: Assert action ran (outputs present or action attempted)
        env:
          SCORE: ${{ steps.action.outputs.score }}
          CATEGORY: ${{ steps.action.outputs.category }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          echo "score: $SCORE"
          echo "category: $CATEGORY"
          # The action may fail in act due to no real PR, but it should have been invoked
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action was invoked"
          else
            echo "FAIL: action was not invoked (outcome=$OUTCOME)"
            exit 1
          fi
